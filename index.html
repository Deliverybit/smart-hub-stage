<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Calculator</title>
    <style>
        body { font-family: sans-serif; padding: 20px; display: flex; justify-content: center; }
        .card { border: 1px solid #ccc; padding: 20px; border-radius: 8px; width: 400px; box-shadow: 2px 2px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 15px; font-weight: bold; font-size: 1.2em; text-align: center; }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .card { width: 100%; }
            input, button { font-size: 18px; }
            #result { font-size: 28px; font-weight: bold; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>💰 Pricing Calculator</h2>
    
    <label>Hourly Rate ($)</label>
    <input type="number" id="rate" placeholder="e.g. 50">

    <label>Hours Worked</label>
    <input type="number" id="hours" placeholder="e.g. 10">

    <button id="calculate-btn">Calculate Total</button>
    <button id="clear-btn" style="margin-top: 10px; background-color: #6c757d;">Clear</button>

    <div id="result">Total: $0</div>
</div>

<script src="script.js"></script>
</body>
</html>
